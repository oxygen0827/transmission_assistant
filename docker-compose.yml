version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    restart: unless-stopped
